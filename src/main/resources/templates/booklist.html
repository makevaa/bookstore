<!DOCTYPEhtml><htmlxmlns="http://www.w3.org/1999/xhtml"xmlns:th="http://www.thymeleaf.org">
<head>
   <title>Booklist</title>
   <link type="text/css" rel="stylesheet" href="css/bootstrap.min.css" th:href="@{css/bootstrap.min.css}" />
</head>
<body>
	
	<h1>Books</h1> 
	
	<table class="table table-striped">	
		<tr>
		   	<th>Author</th>	
		    <th>Title</th>
		    <th>ISBN</th>
		    <th>Year</th>
		</tr>		
		<tr th:each="book : ${books}">
		   	<td  th:text="${book.author}"></td>
		    <td  th:text="${book.title}"></td>
		    <td  th:text="${book.isbn}"></td>
		    <td  th:text="${book.year}"></td>
		    <td><a th:href="@{/delete/{id}(id=${book.id})}" class="btn btn-danger">Delete</a></td>    
		    <td><a th:href="@{/edit/{id}(id=${book.id})}">Edit</a></td>    
		</tr>

	</table>
	 <a class="btn btn-success" href="/add" >Add Book</a>    	
	
	
</body>
</html>
